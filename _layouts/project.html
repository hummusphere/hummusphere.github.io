<!DOCTYPE html>
<html>
    <head>
        <title>hummusphere - {{ page.title }}</title>
        <link rel="icon" type="image/x-icon" href="{{ '../assets/logo.jpg' | relative_url }}">
        <link rel="stylesheet" type="text/css" href="{{ '../styles/style.css' | relative_url }}" />
        <script src="{{ '../scripts/main.js' | relative_url }}"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        {% include header.html %}
        <div id="top"></div>
        <div id="main-content" class="flex flex-col items-center">
            <div style="width: 100%; max-width:1400px; display:grid; grid-template-columns: 300px 1fr; gap: 2rem;">
                <div class="flex flex-col items-center" style="border:1px solid var(--border-color); border-radius: 7px; height: fit-content; padding: 5px; box-shadow: var(--box-shadow);">
                    <h3> Recent Projects </h3>
                    {% for project in site.projects limit:4 %}  
                    <a href="{{ project.url }}" class="blog-side-link">  
                        <p class="blog-list-a-tag">{{ project.title }}</p>  
                    </a>  
                    {% endfor %}  
                    <a href="/projects/" class="see-more"> See More -> </a>
                    <h3> Table Of Contents </h3>
                    {% for item in page.toc %}
                    <a href="#{{ item.id }}" class="blog-side-link">{{ item.title }}</a>
                     {% endfor %}
                </div>
                <div>
                    <div class="flex flex-col items-center" style="width:fit-content; font-size: 20px; line-height: 32px;"> 
                        {{ content }}
                    </div>
                </div>
            </div>
        </div>
        {% include footer.html %}
    </body>
</html>
